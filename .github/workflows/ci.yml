name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npx tsc --noEmit

      # ESLint pendiente de configurar (no hay .eslintrc ni script `lint` en
      # package.json). Cuando se configure, restaurar:
      #   - name: Run ESLint
      #     run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  waiter-bats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install system dependencies
        run: |
          sudo apt-get install -y bash jq sqlite3 curl coreutils

      - name: Run waiter bash tests
        run: |
          if [ -d src/test/waiters ]; then
            bats src/test/waiters/*.bats
          else
            echo "No waiter tests found, skipping"
          fi

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash jq sqlite3 curl coreutils

      - name: Run dependency check script
        run: |
          if [ -f bin/check-dependencies.sh ]; then
            chmod +x bin/check-dependencies.sh
            ./bin/check-dependencies.sh
          else
            echo "Dependency check script not found, skipping"
          fi
